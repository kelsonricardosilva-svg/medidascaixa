<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Medidor de Caixas AR</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ui {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 15px;
            border-radius: 10px;
            font-family: sans-serif;
            text-align: center;
        }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ui">
        <p>Aponte para o marcador "HIRO"<br>e alinhe a caixa com o cubo guia.</p>
        <div id="result">Medidas Estimadas: Calculando...</div>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-marker preset="hiro">
            <a-box id="box-guide" 
                   position="0 0.5 0" 
                   material="opacity: 0.5; color: #2196F3;" 
                   scale="1 1 1"
                   animation="property: material.opacity; from: 0.5; to: 0.2; dir: alternate; dur: 1000; loop: true">
            </a-box>
            
            <a-entity id="measure-text" 
                      text="value: Largura: 10cm\nAltura: 10cm; color: yellow; align: center;" 
                      position="0 1.5 0" 
                      scale="3 3 3">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // Lógica simples para demonstrar a alteração de escala
        // Na prática, você usaria botões para ajustar o cubo sobre a caixa real
        window.addEventListener('keydown', (e) => {
            const box = document.querySelector('#box-guide');
            const text = document.querySelector('#result');
            let scale = box.getAttribute('scale');

            if(e.key === "+") {
                scale.x += 0.1; scale.y += 0.1; scale.z += 0.1;
            }
            if(e.key === "-") {
                scale.x -= 0.1; scale.y -= 0.1; scale.z -= 0.1;
            }

            box.setAttribute('scale', scale);
            // Cálculo fictício baseado na escala do marcador (1 unidade = ~ tamanho do marcador impresso)
            const cm = (scale.x * 5).toFixed(2); 
            text.innerText = `Medidas Estimadas: ${cm}cm x ${cm}cm`;
        });
    </script>
</body>
</html>
