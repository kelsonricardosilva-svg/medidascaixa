<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        .controls {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            z-index: 999; background: rgba(0,0,0,0.8); color: white;
            padding: 15px; border-radius: 15px; font-family: sans-serif; width: 80%;
        }
        button { padding: 10px; margin: 5px; font-size: 18px; border-radius: 5px; border: none; background: #2196F3; color: white; }
        .result { font-size: 20px; font-weight: bold; color: #FFEB3B; margin-bottom: 10px; text-align: center; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">
    <div class="controls">
        <div id="res" class="result">Medida: 5.0 x 5.0 x 5.0 cm</div>
        <div style="display: flex; justify-content: space-around;">
            <div>
                <small>Largura</small><br>
                <button onclick="changeSize('x', 0.1)">+</button>
                <button onclick="changeSize('x', -0.1)">-</button>
            </div>
            <div>
                <small>Altura</small><br>
                <button onclick="changeSize('y', 0.1)">+</button>
                <button onclick="changeSize('y', -0.1)">-</button>
            </div>
            <div>
                <small>Profund.</small><br>
                <button onclick="changeSize('z', 0.1)">+</button>
                <button onclick="changeSize('z', -0.1)">-</button>
            </div>
        </div>
        <p style="font-size: 10px; text-align: center;">Coloque o marcador HIRO encostado na quina da caixa.</p>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        <a-marker preset="hiro">
            <a-box id="caixa-virtual" position="0 0.5 0" 
                   material="color: #2196F3; opacity: 0.6; wireframe: false;"
                   scale="1 1 1">
            </a-box>
            <a-entity shell="geometry: box" material="wireframe: true; color: white;"></a-entity>
        </a-marker>
        <a-entity camera></a-entity>
    </a-scene>

    <script>
        let scale = { x: 1, y: 1, z: 1 };
        // TAMANHO DO MARCADOR: Se você imprimir o Hiro com 5cm de lado, use 5 aqui.
        const TAMANHO_REAL_MARCADOR = 5.0; 

        function changeSize(axis, delta) {
            const box = document.querySelector('#caixa-virtual');
            scale[axis] = Math.max(0.1, scale[axis] + delta);
            box.setAttribute('scale', `${scale.x} ${scale.y} ${scale.z}`);
            
            // Ajusta a posição para o cubo crescer "para cima" do marcador
            box.setAttribute('position', `0 ${scale.y / 2} 0`);

            updateText();
        }

        function updateText() {
            const dx = (scale.x * TAMANHO_REAL_MARCADOR).toFixed(1);
            const dy = (scale.y * TAMANHO_REAL_MARCADOR).toFixed(1);
            const dz = (scale.z * TAMANHO_REAL_MARCADOR).toFixed(1);
            document.getElementById('res').innerText = `Medida: ${dx} x ${dy} x ${dz} cm`;
        }
    </script>
</body>
</html>
